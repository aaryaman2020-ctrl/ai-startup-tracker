<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global AI Startup Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#0f1117;--bg-card:#181b24;--bg-card-hover:#1e2230;--bg-elevated:#222639;
  --border:#2a2e3e;--border-light:#353a4f;
  --text-primary:#e8eaf0;--text-secondary:#8b90a0;--text-muted:#5c6175;
  --pre-seed:#4ade80;--seed:#60a5fa;--series-a:#fb923c;
  --na:#818cf8;--eu:#60a5fa;--apac:#fbbf24;--india:#f472b6;--me:#2dd4bf;--africa:#fb923c;--latam:#c084fc;
  --accent:#818cf8;--accent-dim:rgba(129,140,248,0.15);
  --radius:8px;--radius-lg:12px;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg-base);color:var(--text-primary)}
.dashboard{display:grid;grid-template-rows:auto 1fr;height:100dvh}
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;background:var(--bg-card);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.header h1 span{color:var(--accent);margin-right:6px}
.header-badge{font-size:11px;color:var(--text-muted);background:var(--bg-elevated);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.tabs{display:flex;gap:2px;align-items:center}
.tab{
  padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;
  color:var(--text-secondary);transition:all 0.18s cubic-bezier(0.16,1,0.3,1);border:none;background:transparent;
}
.tab:hover{color:var(--text-primary);background:var(--bg-elevated)}
.tab.active{color:var(--text-primary);background:var(--accent-dim)}
.main{overflow-y:auto;overscroll-behavior:contain;padding:24px}
.panel{display:none;opacity:0;transition:opacity 0.2s ease}
.panel.active{display:block;opacity:1}

/* Metric Cards */
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.metric-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px 20px;
}
.metric-card .label{font-size:12px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.metric-card .value{font-size:28px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums lining-nums}
.metric-card .value.pre-seed{color:var(--pre-seed)}
.metric-card .value.seed{color:var(--seed)}
.metric-card .value.series-a{color:var(--series-a)}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-box{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px;
}
.chart-box h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-secondary)}
.chart-box canvas{max-height:340px}

/* World Map - Overview */
.map-container{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:24px;margin-bottom:24px;position:relative;overflow:hidden;
}
.map-container h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text-secondary)}
.world-map{position:relative;width:100%;height:360px}
.region-bubble{
  position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;
  flex-direction:column;cursor:pointer;transition:transform 0.18s cubic-bezier(0.16,1,0.3,1);
  border:2px solid;
}
.region-bubble:hover{transform:scale(1.1)}
.region-bubble .count{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.region-bubble .rname{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;text-align:center;line-height:1.1;margin-top:2px;overflow:hidden;width:92%;word-wrap:break-word}
.region-line{position:absolute;height:1px;background:var(--border);transform-origin:left center;pointer-events:none;opacity:0.4}

/* Directory */
.filters-bar{
  display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center;
}
.search-input{
  flex:1;min-width:200px;padding:10px 16px;border-radius:var(--radius);
  background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);
  font-size:14px;font-family:inherit;outline:none;transition:border-color 0.18s;
}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text-muted)}
.filter-select{
  padding:10px 12px;border-radius:var(--radius);background:var(--bg-elevated);
  border:1px solid var(--border);color:var(--text-primary);font-size:13px;
  font-family:inherit;cursor:pointer;min-width:140px;outline:none;
}
.filter-select:focus{border-color:var(--accent)}
.count-indicator{font-size:13px;color:var(--text-secondary);white-space:nowrap}

.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead{position:sticky;top:0;z-index:2;background:var(--bg-card)}
.data-table th{
  text-align:left;padding:10px 12px;font-weight:600;color:var(--text-muted);
  border-bottom:1px solid var(--border);cursor:pointer;user-select:none;
  font-size:11px;text-transform:uppercase;letter-spacing:0.5px;
}
.data-table th:hover{color:var(--text-primary)}
.data-table th .sort-arrow{margin-left:4px;opacity:0.5}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tbody tr{transition:background 0.1s}
.data-table tbody tr:hover{background:var(--bg-card-hover)}
.data-table tbody tr.expanded{background:var(--bg-elevated)}
.company-link{color:var(--accent);text-decoration:none;font-weight:500}
.company-link:hover{text-decoration:underline}
.expand-row{display:none;background:var(--bg-elevated)}
.expand-row.show{display:table-row}
.expand-content{padding:16px 12px;font-size:13px;line-height:1.6;color:var(--text-secondary)}
.expand-content strong{color:var(--text-primary);font-weight:600}

/* Badges */
.badge{
  display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;
  white-space:nowrap;
}
.badge-pre-seed{background:rgba(74,222,128,0.15);color:var(--pre-seed)}
.badge-seed{background:rgba(96,165,250,0.15);color:var(--seed)}
.badge-series-a{background:rgba(251,146,60,0.15);color:var(--series-a)}
.badge-na{background:rgba(129,140,248,0.15);color:var(--na)}
.badge-eu{background:rgba(96,165,250,0.15);color:var(--eu)}
.badge-apac{background:rgba(251,191,36,0.15);color:var(--apac)}
.badge-india{background:rgba(244,114,182,0.15);color:var(--india)}
.badge-me{background:rgba(45,212,191,0.15);color:var(--me)}
.badge-africa{background:rgba(251,146,60,0.15);color:var(--africa)}
.badge-latam{background:rgba(192,132,252,0.15);color:var(--latam)}

/* Region cards - World Map tab */
.region-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.region-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px;cursor:pointer;transition:all 0.18s cubic-bezier(0.16,1,0.3,1);
}
.region-card:hover{border-color:var(--border-light);transform:translateY(-1px)}
.region-card.expanded{grid-column:1/-1}
.region-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.region-card-header h3{font-size:16px;font-weight:600}
.region-card-header .rcount{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
.region-companies{display:none;margin-top:16px}
.region-card.expanded .region-companies{display:block}
.mini-company{
  padding:12px;border:1px solid var(--border);border-radius:var(--radius));
  margin-bottom:8px;background:var(--bg-elevated);
}
.mini-company .mc-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.mini-company .mc-name{font-weight:600;font-size:13px}
.mini-company .mc-desc{font-size:12px;color:var(--text-secondary);line-height:1.5}

/* Vertical Map */
.vertical-section{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  margin-bottom:12px;overflow:hidden;
}
.vertical-header{
  display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
  cursor:pointer;transition:background 0.18s;
}
.vertical-header:hover{background:var(--bg-card-hover)}
.vertical-header h3{font-size:14px;font-weight:600}
.vertical-header .vcount{
  font-size:12px;font-weight:600;color:var(--text-muted);
  background:var(--bg-elevated);padding:2px 8px;border-radius:4px;
}
.vertical-body{display:none;padding:0 20px 16px;}
.vertical-section.open .vertical-body{display:block}

/* Idea cards */
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
.idea-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px;transition:border-color 0.18s;
}
.idea-card:hover{border-color:var(--border-light)}
.idea-card h3{font-size:15px;font-weight:600;margin-bottom:8px;line-height:1.4}
.idea-card .idea-meta{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.idea-card .idea-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:12px}
.idea-card .idea-detail{font-size:12px;margin-bottom:6px;color:var(--text-secondary)}
.idea-card .idea-detail strong{color:var(--text-primary)}
.badge-easy{background:rgba(74,222,128,0.15);color:#4ade80}
.badge-medium{background:rgba(251,191,36,0.15);color:#fbbf24}
.badge-hard{background:rgba(239,68,68,0.15);color:#ef4444}

/* Fintech / Success Stories */
.fintech-header{
  background:linear-gradient(135deg,rgba(129,140,248,0.08),rgba(96,165,250,0.08));
  border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px;
}
.fintech-header h2{font-size:20px;font-weight:700;margin-bottom:8px}
.fintech-header p{font-size:13px;color:var(--text-secondary);line-height:1.6;max-width:700px}
.fintech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
.fintech-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px;transition:border-color 0.18s;
}
.fintech-card:hover{border-color:var(--border-light)}
.fintech-card h3{font-size:15px;font-weight:600;margin-bottom:6px}
.fintech-card .fc-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.fintech-card .fc-desc{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:10px}
.fintech-card .fc-detail{font-size:12px;color:var(--text-secondary);margin-bottom:5px}
.fintech-card .fc-detail strong{color:var(--text-primary)}
.badge-valuation{background:rgba(251,191,36,0.15);color:#fbbf24}
</style>
</head>
<body>
<div class="dashboard">
  <header class="header">
    <h1><span>⚡</span>Global AI Startup Tracker</h1>
    <div class="header-badge" id="companyCount">Loading…</div>
    <nav class="tabs">
      <button class="tab active" onclick="switchTab('overview')">Overview</button>
      <button class="tab" onclick="switchTab('directory')">Directory</button>
      <button class="tab" onclick="switchTab('worldmap')">World Map</button>
      <button class="tab" onclick="switchTab('verticals')">Verticals</button>
      <button class="tab" onclick="switchTab('ideas')">Startup Ideas</button>
      <button class="tab" onclick="switchTab('success')">Success Stories</button>
    </nav>
  </header>
  <div class="main">

    <!-- OVERVIEW -->
    <div class="panel active" id="panel-overview">
      <div class="metrics-row" id="metricsRow"></div>
      <div class="charts-grid">
        <div class="chart-box"><h3>Stage Distribution</h3><canvas id="stageChart"></canvas></div>
        <div class="chart-box"><h3>Top Verticals</h3><canvas id="verticalChart"></canvas></div>
      </div>
      <div class="map-container">
        <h3>Geographic Distribution</h3>
        <div class="world-map" id="worldMap"></div>
      </div>
    </div>

    <!-- DIRECTORY -->
    <div class="panel" id="panel-directory">
      <div class="filters-bar">
        <input class="search-input" id="searchInput" placeholder="Search companies, verticals, founders…" oninput="filterCompanies()">
        <select class="filter-select" id="regionFilter" onchange="filterCompanies()">
          <option value="">All Regions</option>
          <option>North America</option><option>Europe</option><option>Asia-Pacific</option>
          <option>India</option><option>Middle East</option><option>Africa</option><option>Latin America</option>
        </select>
        <select class="filter-select" id="stageFilter" onchange="filterCompanies()">
          <option value="">All Stages</option>
          <option>Pre-Seed</option><option>Seed</option><option>Series A</option><option>Series B+</option>
        </select>
        <span class="count-indicator" id="countIndicator"></span>
      </div>
      <table class="data-table">
        <thead><tr>
          <th onclick="sortBy('name')">Company <span class="sort-arrow">&#8597;</span></th>
          <th onclick="sortBy('vertical')">Vertical <span class="sort-arrow">&#8597;</span></th>
          <th onclick="sortBy('region')">Region <span class="sort-arrow">&#8597;</span></th>
          <th onclick="sortBy('stage')">Stage <span class="sort-arrow">&#8597;</span></th>
          <th onclick="sortBy('funding')">Funding</th>
          <th onclick="sortBy('founded')">Founded <span class="sort-arrow">&#8597;</span></th>
        </tr></thead>
        <tbody id="companyTableBody"></tbody>
      </table>
    </div>

    <!-- WORLD MAP -->
    <div class="panel" id="panel-worldmap">
      <div class="region-cards" id="regionCards"></div>
    </div>

    <!-- VERTICALS -->
    <div class="panel" id="panel-verticals">
      <div id="verticalsContainer"></div>
    </div>

    <!-- IDEAS -->
    <div class="panel" id="panel-ideas">
      <div class="ideas-grid" id="ideasGrid"></div>
    </div>

    <!-- SUCCESS STORIES -->
    <div class="panel" id="panel-success">
      <div class="fintech-header">
        <h2>Successful AI Startups</h2>
        <p>Deep analysis of the most successful AI companies — what they built, who backed them, and why they won.</p>
      </div>
      <div class="fintech-grid" id="successGrid"></div>
    </div>

  </div>
</div>
<script>
let COMPANIES=[], IDEAS=[], SUCCESS=[];
let sortCol='', sortDir=1;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function loadData(){
  try{
    const [cr,ir,sr]=await Promise.all([
      fetch('data/global_ai_startups.json'),
      fetch('data/ai_startup_ideas.json'),
      fetch('data/successful_ai_startups.json')
    ]);
    COMPANIES=await cr.json();
    IDEAS=await ir.json();
    SUCCESS=await sr.json();
    document.getElementById('companyCount').textContent=COMPANIES.length+' Companies';
    initMetrics();
    initWorldMapOverview();
    renderDirectory();
    renderWorldMap();
    renderVerticals();
    renderIdeas();
    renderSuccess();
    const hash=location.hash.slice(1);
    if(hash) switchTab(hash); else switchTab('overview');
  } catch(e){
    console.error('Failed to load data:',e);
    document.getElementById('companyCount').textContent='Error loading data';
  }
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const ids=['overview','directory','worldmap','verticals','ideas','success'];
    t.classList.toggle('active',ids[i]===id);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const el=document.getElementById('panel-'+id);
  if(el) el.classList.add('active');
  location.hash=id;
}

function initMetrics(){
  const byStage={};
  COMPANIES.forEach(c=>{byStage[c.stage]=(byStage[c.stage]||0)+1;});
  const byRegion={};
  COMPANIES.forEach(c=>{byRegion[c.region]=(byRegion[c.region]||0)+1;});
  const regions=Object.keys(byRegion).length;
  const html=`
    <div class="metric-card"><div class="label">Total Companies</div><div class="value accent">${COMPANIES.length}</div></div>
    <div class="metric-card"><div class="label">Pre-Seed</div><div class="value pre-seed">${byStage['Pre-Seed']||0}</div></div>
    <div class="metric-card"><div class="label">Seed</div><div class="value seed">${byStage['Seed']||0}</div></div>
    <div class="metric-card"><div class="label">Series A</div><div class="value series-a">${byStage['Series A']||0}</div></div>
    <div class="metric-card"><div class="label">Series B+</div><div class="value" style="color:var(--na)">${byStage['Series B+']||0}</div></div>
    <div class="metric-card"><div class="label">Regions</div><div class="value" style="color:var(--apac)">${regions}</div></div>
  `;
  document.getElementById('metricsRow').innerHTML=html;
  // Charts
  const stageCtx=document.getElementById('stageChart').getContext('2d');
  new Chart(stageCtx,{type:'doughnut',data:{labels:Object.keys(byStage),datasets:[{data:Object.values(byStage),backgroundColor:['#4ade80','#60a5fa','#fb923c','#818cf8','#fbbf24','#f472b6']}]},options:{plugins:{legend:{labels:{color:'#8b90a0',font:{size:12}}}}}});
  const vertCount={};
  COMPANIES.forEach(c=>{vertCount[c.vertical]=(vertCount[c.vertical]||0)+1;});
  const sorted=Object.entries(vertCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const vCtx=document.getElementById('verticalChart').getContext('2d');
  new Chart(vCtx,{type:'bar',data:{labels:sorted.map(x=>x[0]),datasets:[{data:sorted.map(x=>x[1]),backgroundColor:'#818cf8'}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b90a0'}},y:{ticks:{color:'#8b90a0',font:{size:10}}}}}});
}

function initWorldMapOverview(){
  const byRegion={};
  COMPANIES.forEach(c=>{byRegion[c.region]=(byRegion[c.region]||0)+1;});
  const positions={
    'North America':{top:'30%',left:'18%',color:'var(--na)'},
    'Europe':{top:'22%',left:'47%',color:'var(--eu)'},
    'Asia-Pacific':{top:'35%',left:'72%',color:'var(--apac)'},
    'India':{top:'45%',left:'65%',color:'var(--india)'},
    'Middle East':{top:'42%',left:'57%',color:'var(--me)'},
    'Africa':{top:'55%',left:'50%',color:'var(--africa)'},
    'Latin America':{top:'62%',left:'25%',color:'var(--latam)'}
  };
  const container=document.getElementById('worldMap');
  let html='';
  Object.entries(byRegion).forEach(([region,count])=>{
    const pos=positions[region]||{top:'50%',left:'50%',color:'#818cf8'};
    const size=Math.max(60,Math.min(110,40+count*0.5));
    html+=`<div class="region-bubble" style="top:${pos.top};left:${pos.left};width:${size}px;height:${size}px;background:${pos.color}22;border-color:${pos.color};color:${pos.color}" onclick="switchTab('worldmap')">
      <span class="count">${count}</span>
      <span class="rname">${region}</span>
    </div>`;
  });
  container.innerHTML=html;
}

/* Directory */
let filteredCompanies=[];
function renderDirectory(){
  filteredCompanies=[...COMPANIES];
  renderTable();
}
function filterCompanies(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const r=document.getElementById('regionFilter').value;
  const s=document.getElementById('stageFilter').value;
  filteredCompanies=COMPANIES.filter(c=>{
    const matchQ=!q||c.name.toLowerCase().includes(q)||c.vertical.toLowerCase().includes(q)||(c.founders||'').toLowerCase().includes(q)||(c.description||'').toLowerCase().includes(q);
    const matchR=!r||c.region===r;
    const matchS=!s||c.stage===s||(s==='Series B+'&&c.stage&&c.stage.startsWith('Series')&&!['Series A'].includes(c.stage));
    return matchQ&&matchR&&matchS;
  });
  renderTable();
}
function stageClass(s){
  if(!s)return '';
  if(s==='Pre-Seed')return 'badge-pre-seed';
  if(s==='Seed')return 'badge-seed';
  if(s==='Series A')return 'badge-series-a';
  return 'badge-na';
}
function regionClass(r){
  const m={'North America':'badge-na','Europe':'badge-eu','Asia-Pacific':'badge-apac','India':'badge-india','Middle East':'badge-me','Africa':'badge-africa','Latin America':'badge-latam'};
  return m[r]||'badge-na';
}
function sortBy(col){
  if(sortCol===col)sortDir*=-1; else{sortCol=col;sortDir=1;}
  filteredCompanies.sort((a,b)=>{
    const av=a[col]||'', bv=b[col]||'';
    return sortDir*(av<bv?-1:av>bv?1:0);
  });
  renderTable();
}
function renderTable(){
  document.getElementById('countIndicator').textContent=`${filteredCompanies.length} of ${COMPANIES.length} companies`;
  const rows=filteredCompanies.map((c,i)=>`
    <tr onclick="toggleExpand(${i})" style="cursor:pointer">
      <td><a class="company-link" href="${esc(c.website)}" target="_blank" onclick="e=>e.stopPropagation()">${esc(c.name)}</a></td>
      <td>${esc(c.vertical)}</td>
      <td><span class="badge ${regionClass(c.region)}">${esc(c.region)}</span></td>
      <td><span class="badge ${stageClass(c.stage)}">${esc(c.stage)}</span></td>
      <td>${esc(c.funding)}</td>
      <td>${esc(c.founded)}</td>
    </tr>
    <tr class="expand-row" id="expand-${i}">
      <td colspan="6" class="expand-content">
        <strong>Description:</strong> ${esc(c.description)}<br><br>
        <strong>Unique Value:</strong> ${esc(c.unique_value)}<br><br>
        <strong>Founders:</strong> ${esc(c.founders)} &middot; <strong>Location:</strong> ${esc(c.location)}
      </td>
    </tr>`).join('');
  document.getElementById('companyTableBody').innerHTML=rows;
}
function toggleExpand(i){
  const row=document.getElementById('expand-'+i);
  if(row) row.classList.toggle('show');
}

/* World Map */
function renderWorldMap(){
  const byRegion={};
  COMPANIES.forEach(c=>{if(!byRegion[c.region])byRegion[c.region]=[];byRegion[c.region].push(c);});
  const html=Object.entries(byRegion).map(([region,companies])=>`
    <div class="region-card" onclick="this.classList.toggle('expanded')">
      <div class="region-card-header">
        <h3><span class="badge ${regionClass(region)}">${esc(region)}</span></h3>
        <span class="rcount">${companies.length}</span>
      </div>
      <div class="region-companies">
        ${companies.map(c=>`<div class="mini-company">
          <div class="mc-header">
            <span class="mc-name">${esc(c.name)}</span>
            <span class="badge ${stageClass(c.stage)}">${esc(c.stage)}</span>
            <span style="font-size:11px;color:var(--text-muted)">${esc(c.funding)}</span>
          </div>
          <div class="mc-desc">${esc(c.description)}</div>
        </div>`).join('')}
      </div>
    </div>`).join('');
  document.getElementById('regionCards').innerHTML=html;
}

/* Verticals */
function renderVerticals(){
  const byVert={};
  COMPANIES.forEach(c=>{if(!byVert[c.vertical])byVert[c.vertical]=[];byVert[c.vertical].push(c);});
  const sorted=Object.entries(byVert).sort((a,b)=>b[1].length-a[1].length);
  const html=sorted.map(([vert,companies])=>`
    <div class="vertical-section">
      <div class="vertical-header" onclick="this.parentElement.classList.toggle('open')">
        <h3>${esc(vert)}</h3>
        <span class="vcount">${companies.length} companies</span>
      </div>
      <div class="vertical-body">
        <table class="data-table">
          <thead><tr><th>Company</th><th>Stage</th><th>Region</th><th>Funding</th></tr></thead>
          <tbody>${companies.map(c=>`<tr>
            <td><a class="company-link" href="${esc(c.website)}" target="_blank">${esc(c.name)}</a></td>
            <td><span class="badge ${stageClass(c.stage)}">${esc(c.stage)}</span></td>
            <td><span class="badge ${regionClass(c.region)}">${esc(c.region)}</span></td>
            <td>${esc(c.funding)}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`).join('');
  document.getElementById('verticalsContainer').innerHTML=html;
}

/* Ideas */
function renderIdeas(){
  const diffClass={Easy:'badge-easy',Medium:'badge-medium',Hard:'badge-hard'};
  const html=IDEAS.map(idea=>`
    <div class="idea-card">
      <h3>${esc(idea.idea_name)}</h3>
      <div class="idea-meta">
        <span class="badge badge-seed">${esc(idea.vertical)}</span>
        <span class="badge ${diffClass[idea.difficulty]||'badge-medium'}">${esc(idea.difficulty)}</span>
      </div>
      <div class="idea-desc">${esc(idea.description)}</div>
      <div class="idea-detail"><strong>Why Now:</strong> ${esc(idea.why_now)}</div>
      <div class="idea-detail"><strong>Target Market:</strong> ${esc(idea.target_market)}</div>
      <div class="idea-detail"><strong>Revenue Model:</strong> ${esc(idea.revenue_model)}</div>
    </div>`).join('');
  document.getElementById('ideasGrid').innerHTML=html;
}

/* Success Stories */
function renderSuccess(){
  const html=SUCCESS.map(c=>`
    <div class="fintech-card">
      <h3><a class="company-link" href="${esc(c.website)}" target="_blank">${esc(c.company)}</a></h3>
      <div class="fc-meta">
        <span class="badge badge-valuation">${esc(c.last_valuation)}</span>
        <span class="badge badge-na">${esc(c.vertical)}</span>
      </div>
      <div class="fc-desc">${esc(c.what_they_do)}</div>
      <div class="fc-detail"><strong>Funding:</strong> ${esc(c.total_funding)}</div>
      <div class="fc-detail"><strong>Key Investors:</strong> ${esc(c.key_investors)}</div>
      <div class="fc-detail"><strong>Growth:</strong> ${esc(c.revenue_growth)}</div>
      <div class="fc-detail"><strong>Why They Won:</strong> ${esc(c.why_they_succeeded)}</div>
    </div>`).join('');
  document.getElementById('successGrid').innerHTML=html;
}

loadData();
</script>
</body>
</html>
